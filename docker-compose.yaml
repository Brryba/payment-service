services:
  kafka:
    image: confluentinc/cp-kafka:latest
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_KRAFT_MODE: "true"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
  discovery-server:
    image: 'discovery-server:latest'
    container_name:
      'discovery-server-container'

  api-gateway:
    image: 'api-gateway:latest'
    container_name:
      'api-gateway-container'
    environment:
      - JWT_KEY=${JWT_KEY}
      - EUREKA_URI=http://discovery-server:8761/eureka
    ports:
      - "80:80"
    depends_on:
      - discovery-server

  order-service:
    image: 'order-service:latest'
    container_name: 'order-service-container'
    depends_on:
      - order-db
      - discovery-server
      - kafka
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/${DB_ORDER_SCHEMA}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - EUREKA_URI=http://discovery-server:8761/eureka

  order-db:
    image: postgres
    container_name: 'order-db'
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_ORDER_SCHEMA}

  auth-service:
    image: 'auth-service:latest'
    container_name:
      'auth-service-container'
    depends_on:
      - auth-db
      - discovery-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/${DB_AUTH_SCHEMA}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_KEY=${JWT_KEY}
      - EUREKA_URI=http://discovery-server:8761/eureka

  auth-db:
    image: postgres
    container_name: 'auth-db'
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_AUTH_SCHEMA}

  user-service:
    image: 'user-service:latest'
    container_name: 'user-service-container'
    depends_on:
      - user-db
      - user-redis-cache
      - discovery-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/${DB_USER_SCHEMA}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}

      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_HOST=user-redis-cache
      - EUREKA_URI=http://discovery-server:8761/eureka

  user-db:
    image: postgres
    container_name: user-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_USER_SCHEMA}

  user-redis-cache:
    image: 'redis:alpine'
    container_name: 'redis-cache'
    restart: always

  payment-service:
    image: 'payment-service:latest'
    container_name:
      'payment-service-container'
    depends_on:
      - discovery-server
      - kafka
    environment:
      - EUREKA_URI=http://discovery-server:8761/eureka

  payment-db:
    image: mongo
    container_name: payment-db
    environment:


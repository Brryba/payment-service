name: CI pipeline for Payment Service
on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download built JAR
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: target/

      - name: Run tests
        run: mvn test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR without tests
        run: mvn clean package -DskipTests

      - name: Upload artifact for other jobs
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/*.jar

  container:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download code from repository to ci workspace
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: target/

      - name: Build Docker image
        run: |
          docker build -t payment-service-docker-image .

      - name: Run Docker container
        run: |
          docker run -d --name payment-service-container \
            -e MONGO_DB=${{ secrets.MONGO_DB }} \
            -e KAFKA_BOOTSTRAP=${{ secrets.KAFKA_BOOTSTRAP }} \
            payment-service-docker-image

  sonarqube:
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
        run: |
          mvn -B -X verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.1.0.4751:sonar \
            -Dsonar.projectKey=innowise:payment-service \
            -Dsonar.organization=brryba \
            -Dsonar.coverage.exclusions=**/* \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=$SONAR_TOKEN \
            -DskipTests
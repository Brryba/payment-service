name: CI pipeline for Payment Service
on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download built JAR
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: target/

      - name: Run tests
        run: mvn test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR without tests
        run: mvn clean package -DskipTests

      - name: Upload artifact for other jobs
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/*.jar

  container:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download code from repository to ci workspace
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: target/

      - name: Build Docker image
        run: |
          docker build -t payment-service-docker-image .

      - name: Run Docker container
        run: |
          docker run --name payment-service-container